# Reusable workflow: Deploy a Docker image to an Azure App Service container
# Authenticates via OIDC. Sets APP_VERSION as an app setting BEFORE flipping
# the container image, so /health responses on the new container expose the
# right version from the first request.
#
# Health check matches the deployed version against the app's response —
# catches stuck restarts where the App Service didn't pick up the new image.
#
# Called by: humind-chat-service, humind-scheduler-service

name: Container App Deploy

on:
  workflow_call:
    inputs:
      app_name:
        description: 'Azure App Service name'
        required: true
        type: string
      resource_group:
        description: 'Azure resource group containing the App Service'
        required: true
        type: string
      image_uri:
        description: 'Full image URI to deploy (output of docker-build-push.yml)'
        required: true
        type: string
      version:
        description: 'Version string injected as APP_VERSION env var on the App Service'
        required: true
        type: string
      app_url:
        description: 'Public URL of the App Service (for health verification)'
        required: true
        type: string
      health_path:
        description: 'Health endpoint path (default /health)'
        required: false
        type: string
        default: '/health'
      health_check_retries:
        description: 'Number of mgmt-plane health check retry attempts'
        required: false
        type: string
        default: '20'
      health_check_delay:
        description: 'Seconds between health check retries'
        required: false
        type: string
        default: '10'
      environment_name:
        description: 'GitHub environment name (preprod, production)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment_name }}
      url: ${{ inputs.app_url }}
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set APP_VERSION app setting (before image flip)
        # Setting this BEFORE swapping the container image means the new image's
        # first startup already sees the right env var — no restart-then-update
        # race where /health briefly returns the old version.
        run: |
          az webapp config appsettings set \
            --resource-group ${{ inputs.resource_group }} \
            --name ${{ inputs.app_name }} \
            --settings APP_VERSION=${{ inputs.version }} \
            --output none

      - name: Set container image
        run: |
          az webapp config container set \
            --resource-group ${{ inputs.resource_group }} \
            --name ${{ inputs.app_name }} \
            --container-image-name ${{ inputs.image_uri }} \
            --output none

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group ${{ inputs.resource_group }} \
            --name ${{ inputs.app_name }}

      - name: Verify deployed state via Azure mgmt-plane
        # Goes through Azure Resource Manager (Entra ID auth), not HTTP curl.
        # Post-network-lockdown, *.azurewebsites.net is blocked by ip_restriction
        # rules — only VNet + Front Door (with X-Azure-FDID) can reach it, so
        # a curl from the runner would always time out. Instead poll `az webapp
        # show` until state == Running.
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            max_retries=${{ inputs.health_check_retries }}
            retry_delay=${{ inputs.health_check_delay }}

            for i in $(seq 1 $max_retries); do
              state=$(az webapp show \
                --name "${{ inputs.app_name }}" \
                --resource-group "${{ inputs.resource_group }}" \
                --query state -o tsv 2>/dev/null || echo "Unknown")

              if [ "$state" = "Running" ]; then
                echo "Healthy: ${{ inputs.app_name }} state=$state"
                exit 0
              fi

              echo "Attempt $i/$max_retries: state=$state, retrying in ${retry_delay}s..."
              [ $i -lt $max_retries ] && sleep $retry_delay
            done

            echo "::error::${{ inputs.app_name }} did not reach Running state after $max_retries attempts"
            exit 1

      - name: Logout from Azure
        run: az logout
        if: always()
