# Reusable workflow: Slot-based App Service deployment for one region
# Handles: deploy to staging slot → verify → swap → verify production → rollback on failure
#
# Called by: humind-backend, humind-website

name: Slot Deploy Region

on:
  workflow_call:
    inputs:
      region_label:
        description: 'Human-readable region name (e.g., Europe, US)'
        required: true
        type: string
      app_name:
        description: 'Azure App Service name'
        required: true
        type: string
      resource_group:
        description: 'Azure resource group'
        required: true
        type: string
      staging_url:
        description: 'URL of the staging slot'
        required: true
        type: string
      production_url:
        description: 'URL of the production slot'
        required: true
        type: string
      staging_slot_name:
        description: 'Name of the staging deployment slot'
        required: false
        type: string
        default: 'staging'
      artifact_name:
        description: 'Name of the build artifact to download'
        required: true
        type: string
      artifact_filename:
        description: 'Zip filename inside the artifact (e.g., deploy.zip)'
        required: true
        type: string
      health_check_path:
        description: 'URL path for health checks (e.g., /health or /)'
        required: true
        type: string
      health_check_wait:
        description: 'Seconds to wait before first health check (keep small — az mgmt-plane checks are cheap)'
        required: false
        type: string
        default: '5'
      health_check_retries:
        description: 'Number of health check retry attempts'
        required: false
        type: string
        default: '20'
      health_check_delay:
        description: 'Seconds between health check retries'
        required: false
        type: string
        default: '10'
      skip_swap:
        description: 'Deploy to staging slot only (do not swap to production)'
        required: false
        type: boolean
        default: false
      env_staging:
        description: 'GitHub environment name for staging deployment'
        required: true
        type: string
      env_production:
        description: 'GitHub environment name for production deployment'
        required: true
        type: string
      version:
        description: 'Version string injected as APP_VERSION on the staging slot before deploy. Swaps to production with the swap, so the live slot ends up with the right value.'
        required: true
        type: string
    outputs:
      deployment_status:
        description: 'Final deployment status: staging-only, healthy, or unhealthy'
        value: ${{ jobs.status.outputs.result }}

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================
  # DEPLOY TO STAGING SLOT
  # ============================================
  deploy-staging:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.env_staging }}
      url: ${{ inputs.staging_url }}
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set APP_VERSION on staging slot
        # Set BEFORE the zip deploy so the app picks it up on its first start
        # after deployment. The setting also follows the swap into production,
        # so the live slot ends up reporting the right version.
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            az webapp config appsettings set \
              --resource-group ${{ inputs.resource_group }} \
              --name ${{ inputs.app_name }} \
              --slot ${{ inputs.staging_slot_name }} \
              --settings APP_VERSION=${{ inputs.version }} \
              --output none

      - name: Deploy to ${{ inputs.region_label }} staging slot
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Deploying to ${{ inputs.region_label }} staging slot..."
            az webapp deploy \
              --resource-group ${{ inputs.resource_group }} \
              --name ${{ inputs.app_name }} \
              --slot ${{ inputs.staging_slot_name }} \
              --src-path ${{ inputs.artifact_filename }} \
              --type zip \
              --async false
            echo "Deployment to staging slot complete"

      - name: Logout from Azure
        run: az logout
        if: always()

  # ============================================
  # VERIFY STAGING SLOT
  # ============================================
  # Verification goes through the Azure management plane (Entra ID auth), not
  # data-plane curl, because *.azurewebsites.net is blocked by ip_restriction
  # post-network-lockdown. We check:
  #   1. Slot state == Running (app didn't crash on startup)
  #   2. Last deployment status == 4 (Success — 0=Pending, 1..3=in progress/failed)
  # The swap step itself enforces 200 on /health via WEBSITE_SWAP_WARMUP_PING_PATH
  # (set in humind-infrastructure), so a slot that would 500 cannot be swapped.
  verify-staging:
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment:
      name: ${{ inputs.env_staging }}
    outputs:
      health_status: ${{ steps.health_check.outputs.status }}
    steps:
      - name: Wait for deployment to stabilize
        run: sleep ${{ inputs.health_check_wait }}

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify ${{ inputs.region_label }} staging slot health
        id: health_check
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            max_retries=${{ inputs.health_check_retries }}
            retry_delay=${{ inputs.health_check_delay }}

            for i in $(seq 1 $max_retries); do
              state=$(az webapp show \
                --name "${{ inputs.app_name }}" \
                --resource-group "${{ inputs.resource_group }}" \
                --slot "${{ inputs.staging_slot_name }}" \
                --query state -o tsv 2>/dev/null || echo "Unknown")
              deploy_status=$(az webapp log deployment list \
                --name "${{ inputs.app_name }}" \
                --resource-group "${{ inputs.resource_group }}" \
                --slot "${{ inputs.staging_slot_name }}" \
                --query "[0].status" -o tsv 2>/dev/null || echo "")
              deploy_status="${deploy_status:-unknown}"

              if [ "$state" = "Running" ] && [ "$deploy_status" = "4" ]; then
                echo "${{ inputs.region_label }} staging healthy (state=$state, deploy_status=$deploy_status)"
                echo "status=healthy" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "Attempt $i/$max_retries: state=$state deploy_status=$deploy_status, retrying in ${retry_delay}s..."
              [ $i -lt $max_retries ] && sleep $retry_delay
            done

            echo "${{ inputs.region_label }} staging health check failed after $max_retries attempts"
            echo "status=unhealthy" >> $GITHUB_OUTPUT
            exit 1

      - name: Logout from Azure
        run: az logout
        if: always()

  # ============================================
  # SWAP STAGING TO PRODUCTION
  # ============================================
  swap:
    runs-on: ubuntu-latest
    needs: verify-staging
    if: |
      needs.verify-staging.outputs.health_status == 'healthy' &&
      inputs.skip_swap != true
    environment:
      name: ${{ inputs.env_production }}
      url: ${{ inputs.production_url }}
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging to production (${{ inputs.region_label }})
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "Swapping staging slot to production for ${{ inputs.region_label }}..."
            az webapp deployment slot swap \
              --resource-group ${{ inputs.resource_group }} \
              --name ${{ inputs.app_name }} \
              --slot ${{ inputs.staging_slot_name }} \
              --target-slot production
            echo "Swap completed successfully"

      - name: Logout from Azure
        run: az logout
        if: always()

  # ============================================
  # VERIFY PRODUCTION AFTER SWAP
  # ============================================
  # Post-swap health is already enforced by the swap warmup ping (Azure refuses
  # to complete a swap if the target slot doesn't return 200 on
  # WEBSITE_SWAP_WARMUP_PING_PATH). This job therefore only sanity-checks that
  # the production slot is Running via the management plane.
  verify-production:
    runs-on: ubuntu-latest
    needs: swap
    if: inputs.skip_swap != true
    environment:
      name: ${{ inputs.env_production }}
    outputs:
      health_status: ${{ steps.health_check.outputs.status }}
    steps:
      - name: Wait for swap to stabilize
        # Short sanity delay — the mgmt-plane check below polls until Running,
        # so no need to sleep long. Swap has already completed (Azure returned).
        run: sleep 5

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Verify ${{ inputs.region_label }} production health after swap
        id: health_check
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            max_retries=${{ inputs.health_check_retries }}
            retry_delay=${{ inputs.health_check_delay }}

            for i in $(seq 1 $max_retries); do
              state=$(az webapp show \
                --name "${{ inputs.app_name }}" \
                --resource-group "${{ inputs.resource_group }}" \
                --query state -o tsv 2>/dev/null || echo "Unknown")

              if [ "$state" = "Running" ]; then
                echo "${{ inputs.region_label }} production healthy after swap (state=$state)"
                echo "status=healthy" >> $GITHUB_OUTPUT
                exit 0
              fi
              echo "Attempt $i/$max_retries: production state=$state, retrying in ${retry_delay}s..."
              [ $i -lt $max_retries ] && sleep $retry_delay
            done

            echo "status=unhealthy" >> $GITHUB_OUTPUT
            echo "::error::${{ inputs.region_label }} production not Running after swap!"
            exit 1

      - name: Logout from Azure
        run: az logout
        if: always()

  # ============================================
  # AUTO-ROLLBACK ON FAILURE
  # ============================================
  rollback:
    runs-on: ubuntu-latest
    needs: verify-production
    if: failure() && needs.verify-production.outputs.health_status == 'unhealthy'
    environment:
      name: ${{ inputs.env_production }}
    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Rollback ${{ inputs.region_label }} (swap back)
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            echo "::warning::Rolling back ${{ inputs.region_label }} deployment by swapping slots..."
            az webapp deployment slot swap \
              --resource-group ${{ inputs.resource_group }} \
              --name ${{ inputs.app_name }} \
              --slot ${{ inputs.staging_slot_name }} \
              --target-slot production
            echo "Rollback swap completed"

      - name: Logout from Azure
        run: az logout
        if: always()

  # ============================================
  # COMPUTE FINAL STATUS
  # ============================================
  status:
    runs-on: ubuntu-latest
    if: always()
    needs: [verify-staging, swap, verify-production, rollback]
    outputs:
      result: ${{ steps.compute.outputs.status }}
    steps:
      - name: Compute deployment status
        id: compute
        run: |
          if [ "${{ inputs.skip_swap }}" = "true" ]; then
            if [ "${{ needs.verify-staging.outputs.health_status }}" = "healthy" ]; then
              echo "status=staging-only" >> $GITHUB_OUTPUT
            else
              echo "status=unhealthy" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ needs.verify-production.outputs.health_status }}" = "healthy" ]; then
            echo "status=healthy" >> $GITHUB_OUTPUT
          elif [ "${{ needs.rollback.result }}" = "success" ]; then
            echo "status=rolled-back" >> $GITHUB_OUTPUT
          else
            echo "status=unhealthy" >> $GITHUB_OUTPUT
          fi
